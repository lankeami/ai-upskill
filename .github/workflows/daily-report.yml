name: Daily AI Report

on:
  schedule:
    - cron: '30 8 * * *'  # 3:30 AM EST / 4:30 AM EDT (UTC-5/UTC-4)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -o ai-report ./cmd/ai-report

      - name: Generate report
        run: ./ai-report generate

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Verify Jekyll output
        run: ./scripts/test-jekyll-output.sh

      - name: Sync today.md
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="reports/${DATE}.md"
          if [ -f "$REPORT" ]; then
            awk '
              BEGIN { fm=0; done=0 }
              /^---$/ && fm==0 { fm=1; print; next }
              /^---$/ && fm==1 && done==0 { print "permalink: /today"; print; done=1; next }
              { print }
            ' "$REPORT" > today.md
          else
            echo "Report $REPORT not found, skipping today.md sync"
          fi

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ today.md
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "chore: daily AI report for $(date -u +%Y-%m-%d)"
            git push
          fi
