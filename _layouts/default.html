<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --header-bg: #0f172a;
      --header-text: #f1f5f9;
      --header-text-hover: #a5b4fc;
      --text-disabled: #cbd5e1;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      background: var(--header-bg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
    }
    .site-header a {
      color: var(--header-text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
    }
    .site-header a:hover { color: var(--header-text-hover); text-decoration: none; }
    .site-main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      padding: 2.5rem 1.5rem;
    }
    .site-footer {
      background: var(--header-bg);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.5rem;
      color: #94a3b8;
      font-size: 0.875rem;
      text-align: center;
    }
    h1 { font-size: 2rem; font-weight: 700; line-height: 1.25; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    h2 { font-size: 1.4rem; font-weight: 600; line-height: 1.35; margin-top: 2rem; margin-bottom: 0.75rem; }
    h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    p { margin-bottom: 1rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.25rem; }
    /* Index page: style top-level ul > li as hover-lift cards */
    .site-main > ul {
      list-style: none;
      padding: 0;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .site-main > ul > li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    .site-main > ul > li:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .site-main > ul > li a { font-weight: 600; }
    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .site-main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
  </header>
  <main class="site-main">
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>Generated daily from Reddit, Hacker News, and RSS feeds.</p>
  </footer>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('a[href]').forEach(function(a) {
    if (!a.getAttribute('href').startsWith('#')) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>
</body>
</html>
